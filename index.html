<script>
let currentAccount = null;
let isEligible = false;
let hasClaimed = false;

const contractAddress = "0x000000000000000000000000000000000000dead"; // change to yours

// ---------- INIT ----------
window.addEventListener("load", () => {
  if (!window.opwallet || !window.opwallet.request) {
    document.getElementById("noWalletWarn").style.display = "block";
  }

  const storedClaim = localStorage.getItem("opdrop_claimed");
  if (storedClaim === "true") {
    hasClaimed = true;
    showClaimedState();
  }
});

// ---------- CONNECT ----------
async function connectWallet() {
  try {
    if (!window.opwallet || !window.opwallet.request) {
      alert("OP_WALLET not installed");
      return;
    }

    const accounts = await window.opwallet.request({
      method: "eth_requestAccounts"
    });

    if (!Array.isArray(accounts) || accounts.length === 0) {
      throw new Error("No accounts returned");
    }

    currentAccount = accounts[0];

    document.getElementById("displayaccounts").textContent =
      currentAccount.slice(0, 6) + "..." + currentAccount.slice(-4);

    document.getElementById("walletInfo").classList.add("visible");
    document.getElementById("checkBtn").disabled = false;

    document.getElementById("step1").classList.remove("active");
    document.getElementById("step1").classList.add("done");
    document.getElementById("step2").classList.add("active");

  } catch (err) {
    console.error(err);
    alert("Connection failed");
  }
}

// ---------- ELIGIBILITY ----------
async function checkEligibility() {
  try {
    if (!currentAccount) {
      alert("Connect wallet first");
      return;
    }

    const btn = document.getElementById("checkBtn");
    btn.innerHTML = '<span class="spinner"></span> Checking...';
    btn.disabled = true;

    // Example: fake transaction count
    // Replace with real API call if needed
    const fakeTxCount = 3;

    if (fakeTxCount >= 2) {
      isEligible = true;
      document.getElementById("eligDot").classList.add("dot-green");

      document.getElementById("step2").classList.remove("active");
      document.getElementById("step2").classList.add("done");
      document.getElementById("step3").classList.add("active");

      alert("Wallet Eligible ✅");
    } else {
      isEligible = false;
      alert("Not enough transactions (min 2 required)");
    }

    btn.innerHTML = "Check Eligibility";
    btn.disabled = false;

  } catch (err) {
    console.error(err);
    alert("Eligibility check failed");
  }
}

// ---------- CLAIM ----------
async function claimAirdrop() {
  try {
    if (!currentAccount) {
      alert("Connect wallet first");
      return;
    }

    if (!isEligible) {
      alert("Wallet not eligible");
      return;
    }

    if (hasClaimed) {
      alert("Already claimed");
      return;
    }

    const txHash = await window.opwallet.request({
      method: "eth_sendTransaction",
      params: [{
        from: currentAccount,
        to: contractAddress,
        value: "0x0"
      }]
    });

    if (!txHash) {
      throw new Error("Transaction rejected");
    }

    localStorage.setItem("opdrop_claimed", "true");
    hasClaimed = true;

    showClaimedState();

    alert("Claim successful!\nTX: " + txHash);

  } catch (err) {
    console.error(err);
    alert("Claim failed: " + err.message);
  }
}

// ---------- CLAIMED UI ----------
function showClaimedState() {
  const claimBtn = document.getElementById("claimBtn");
  if (claimBtn) {
    claimBtn.disabled = true;
    claimBtn.innerText = "Already Claimed";
  }
}
</script>
