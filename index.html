<script>
let currentAccount = null;
let isEligible = false;

document.addEventListener("DOMContentLoaded", function () {

  // Detect wallet
  if (!window.opwallet || !window.opwallet.request) {
    const warn = document.getElementById("noWalletWarn");
    if (warn) warn.style.display = "block";
  }

});

// ---------- CONNECT ----------
async function connectWallet() {
  try {
    if (!window.opwallet || !window.opwallet.request) {
      alert("OP_WALLET not installed");
      return;
    }

    const accounts = await window.opwallet.request({
      method: "eth_requestAccounts"
    });

    if (!accounts || accounts.length === 0) {
      alert("No account found");
      return;
    }

    currentAccount = accounts[0];

    document.getElementById("displayaccounts").innerText =
      currentAccount.slice(0, 6) + "..." + currentAccount.slice(-4);

    document.getElementById("walletInfo").classList.add("visible");
    document.getElementById("checkBtn").disabled = false;

  } catch (error) {
    console.error(error);
    alert("Connection failed");
  }
}

// ---------- CHECK ----------
async function checkEligibility() {
  if (!currentAccount) {
    alert("Connect wallet first");
    return;
  }

  // Simulated tx count (replace later)
  const txCount = 3;

  if (txCount >= 2) {
    isEligible = true;
    alert("Eligible ✅");
  } else {
    isEligible = false;
    alert("Not eligible ❌");
  }
}

// ---------- CLAIM ----------
async function claimAirdrop() {
  try {
    if (!currentAccount) {
      alert("Connect wallet first");
      return;
    }

    if (!isEligible) {
      alert("Not eligible");
      return;
    }

    const tx = await window.opwallet.request({
      method: "eth_sendTransaction",
      params: [{
        from: currentAccount,
        to: currentAccount,
        value: "0x0"
      }]
    });

    alert("Claim success ✅\nTX: " + tx);

  } catch (error) {
    console.error(error);
    alert("Claim failed");
  }
}
</script>
